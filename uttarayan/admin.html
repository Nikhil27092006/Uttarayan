<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>UTTARAYAN | Admin Panel</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:ital,wght@0,300;0,400;0,500;0,600;1,300;1,400&family=Italiana&family=Tenor+Sans&display=swap" rel="stylesheet">
    <link href="https://fonts.googleapis.com/css2?family=Bebas+Neue&display=swap" rel="stylesheet">
    <style>
        :root {
            --bg: #0a0a0a;
            --bg-dark: #050505;
            --bg-soft: #141414;
            --text: #f5f5f5;
            --text-muted: #888888;
            --gold: #c9a962;
            --gold-bright: #e8d5a0;
            --gold-dark: #7a6540;
            --warm-orange: #d4652f;
            --spice-red: #8b2500;
            --font-display: 'Italiana', serif;
            --font-body: 'Tenor Sans', sans-serif;
            --font-serif: 'Cormorant Garamond', serif;
            --font-condensed: 'Bebas Neue', sans-serif;
            --ease-out-expo: cubic-bezier(0.19, 1, 0.22, 1);
        }

        * { margin: 0; padding: 0; box-sizing: border-box; }

        body {
            font-family: var(--font-body);
            background: var(--bg-dark);
            color: var(--text);
            min-height: 100vh;
        }

        /* Login Screen */
        .login-screen {
            position: fixed;
            inset: 0;
            display: flex;
            justify-content: center;
            align-items: center;
            background: var(--bg-dark);
            z-index: 1000;
        }

        .login-screen.hidden { display: none; }

        .login-box {
            background: var(--bg-soft);
            padding: 3rem;
            border: 1px solid rgba(201, 169, 98, 0.2);
            text-align: center;
            max-width: 400px;
            width: 90%;
        }

        .login-title {
            font-family: var(--font-display);
            font-size: 2rem;
            color: var(--gold);
            margin-bottom: 0.5rem;
        }

        .login-subtitle {
            font-size: 0.85rem;
            color: var(--text-muted);
            margin-bottom: 2rem;
        }

        .login-input {
            width: 100%;
            padding: 1rem;
            background: rgba(255, 255, 255, 0.05);
            border: 1px solid rgba(201, 169, 98, 0.2);
            color: var(--text);
            font-family: var(--font-body);
            font-size: 1rem;
            margin-bottom: 1rem;
            transition: border-color 0.3s;
        }

        .login-input:focus {
            outline: none;
            border-color: var(--gold);
        }

        .login-btn {
            width: 100%;
            padding: 1rem;
            background: var(--gold);
            border: none;
            color: var(--bg-dark);
            font-family: var(--font-body);
            font-size: 0.8rem;
            letter-spacing: 0.2em;
            text-transform: uppercase;
            cursor: pointer;
            transition: background 0.3s;
        }

        .login-btn:hover { background: var(--gold-bright); }

        .login-error {
            color: #ff4444;
            font-size: 0.8rem;
            margin-top: 1rem;
            display: none;
        }

        /* Admin Dashboard */
        .admin-dashboard {
            display: none;
            padding: 2rem;
        }

        .admin-dashboard.active { display: block; }

        .admin-header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            padding-bottom: 2rem;
            border-bottom: 1px solid rgba(201, 169, 98, 0.2);
            margin-bottom: 2rem;
        }

        .admin-brand {
            font-family: var(--font-display);
            font-size: 2rem;
            color: var(--gold);
        }

        .admin-logout {
            padding: 0.8rem 1.5rem;
            background: transparent;
            border: 1px solid var(--gold);
            color: var(--gold);
            font-family: var(--font-body);
            cursor: pointer;
            transition: all 0.3s;
        }

        .admin-logout:hover {
            background: var(--gold);
            color: var(--bg-dark);
        }

        .admin-stats {
            display: grid;
            grid-template-columns: repeat(4, 1fr);
            gap: 1.5rem;
            margin-bottom: 3rem;
        }

        .stat-card {
            background: var(--bg-soft);
            padding: 1.5rem;
            border: 1px solid rgba(201, 169, 98, 0.1);
        }

        .stat-value {
            font-family: var(--font-condensed);
            font-size: 2.5rem;
            color: var(--gold);
        }

        .stat-label {
            font-size: 0.7rem;
            letter-spacing: 0.2em;
            text-transform: uppercase;
            color: var(--text-muted);
        }

        .bookings-section {
            background: var(--bg-soft);
            border: 1px solid rgba(201, 169, 98, 0.1);
            padding: 2rem;
        }

        .bookings-header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 1.5rem;
        }

        .bookings-title {
            font-family: var(--font-display);
            font-size: 1.5rem;
            color: var(--text);
        }

        .bookings-clear {
            padding: 0.5rem 1rem;
            background: transparent;
            border: 1px solid rgba(255, 100, 100, 0.5);
            color: #ff6666;
            font-size: 0.7rem;
            cursor: pointer;
        }

        .bookings-table {
            width: 100%;
            border-collapse: collapse;
        }

        .bookings-table th,
        .bookings-table td {
            padding: 1rem;
            text-align: left;
            border-bottom: 1px solid rgba(201, 169, 98, 0.1);
        }

        .bookings-table th {
            font-family: var(--font-body);
            font-size: 0.65rem;
            letter-spacing: 0.2em;
            text-transform: uppercase;
            color: var(--gold);
            background: rgba(201, 169, 98, 0.05);
        }

        .bookings-table td {
            font-size: 0.9rem;
            color: var(--text-muted);
        }

        .booking-id {
            font-family: var(--font-condensed);
            color: var(--gold);
        }

        .booking-status {
            display: inline-block;
            padding: 0.3rem 0.8rem;
            background: rgba(201, 169, 98, 0.2);
            color: var(--gold);
            font-size: 0.7rem;
            text-transform: uppercase;
        }

        .no-bookings {
            text-align: center;
            padding: 3rem;
            color: var(--text-muted);
        }

        @media (max-width: 768px) {
            .admin-stats { grid-template-columns: repeat(2, 1fr); }
            .bookings-table { display: block; overflow-x: auto; }
        }
    </style>
</head>
<body>
    <!-- Login Screen -->
    <div class="login-screen" id="login-screen">
        <div class="login-box">
            <h1 class="login-title">UTTARAYAN</h1>
            <p class="login-subtitle">Admin Panel Access</p>
            <input type="password" class="login-input" id="admin-password" placeholder="Enter Admin Password">
            <button class="login-btn" id="login-btn">Login</button>
            <p class="login-error" id="login-error">Incorrect password. Try again.</p>
        </div>
    </div>

    <!-- Admin Dashboard -->
    <div class="admin-dashboard" id="admin-dashboard">
        <div class="admin-header">
            <div class="admin-brand">UTTARAYAN <span style="font-size: 0.8rem; color: var(--text-muted);">Admin Panel</span></div>
            <button class="admin-logout" id="logout-btn">Logout</button>
        </div>

        <div class="admin-stats">
            <div class="stat-card">
                <div class="stat-value" id="total-bookings">0</div>
                <div class="stat-label">Total Reservations</div>
            </div>
            <div class="stat-card">
                <div class="stat-value" id="today-bookings">0</div>
                <div class="stat-label">Today's Bookings</div>
            </div>
            <div class="stat-card">
                <div class="stat-value" id="upcoming-bookings">0</div>
                <div class="stat-label">Upcoming</div>
            </div>
            <div class="stat-card">
                <div class="stat-value" id="this-week">0</div>
                <div class="stat-label">This Week</div>
            </div>
        </div>

        <div class="bookings-section">
            <div class="bookings-header">
                <h2 class="bookings-title">Recent Reservations</h2>
                <button class="bookings-clear" id="clear-bookings">Clear All Data</button>
            </div>
            <table class="bookings-table">
                <thead>
                    <tr>
                        <th>Booking ID</th>
                        <th>Name</th>
                        <th>Phone</th>
                        <th>Date</th>
                        <th>Time</th>
                        <th>Guests</th>
                        <th>Occasion</th>
                        <th>Status</th>
                    </tr>
                </thead>
                <tbody id="bookings-tbody">
                </tbody>
            </table>
            <div class="no-bookings" id="no-bookings" style="display: none;">
                No reservations yet.
            </div>
        </div>
    </div>

    <script>
        // Admin Password (change this to whatever you want)
        const ADMIN_PASSWORD = 'uttarayan2024';

        // DOM Elements
        const loginScreen = document.getElementById('login-screen');
        const adminDashboard = document.getElementById('admin-dashboard');
        const loginBtn = document.getElementById('login-btn');
        const logoutBtn = document.getElementById('logout-btn');
        const passwordInput = document.getElementById('admin-password');
        const loginError = document.getElementById('login-error');
        const bookingsTbody = document.getElementById('bookings-tbody');
        const noBookings = document.getElementById('no-bookings');

        // Check if already logged in
        if (sessionStorage.getItem('admin_logged_in') === 'true') {
            loginScreen.classList.add('hidden');
            adminDashboard.classList.add('active');
            loadBookings();
        }

        // Login
        loginBtn.addEventListener('click', () => {
            if (passwordInput.value === ADMIN_PASSWORD) {
                sessionStorage.setItem('admin_logged_in', 'true');
                loginScreen.classList.add('hidden');
                adminDashboard.classList.add('active');
                loadBookings();
            } else {
                loginError.style.display = 'block';
                passwordInput.value = '';
            }
        });

        passwordInput.addEventListener('keypress', (e) => {
            if (e.key === 'Enter') {
                loginBtn.click();
            }
        });

        // Logout
        logoutBtn.addEventListener('click', () => {
            sessionStorage.removeItem('admin_logged_in');
            loginScreen.classList.remove('hidden');
            adminDashboard.classList.remove('active');
            passwordInput.value = '';
            loginError.style.display = 'none';
        });

        // Clear all bookings
        document.getElementById('clear-bookings').addEventListener('click', () => {
            if (confirm('Are you sure you want to clear all booking data?')) {
                localStorage.removeItem('uttarayan_bookings');
                loadBookings();
            }
        });

        // Load and display bookings
        function loadBookings() {
            const bookings = JSON.parse(localStorage.getItem('uttarayan_bookings') || '[]');
            const today = new Date().toISOString().split('T')[0];

            // Update stats
            document.getElementById('total-bookings').textContent = bookings.length;
            document.getElementById('today-bookings').textContent = bookings.filter(b => b.date === today).length;
            document.getElementById('upcoming-bookings').textContent = bookings.filter(b => b.date >= today).length;

            const thisWeek = new Date();
            thisWeek.setDate(thisWeek.getDate() + 7);
            const weekStr = thisWeek.toISOString().split('T')[0];
            document.getElementById('this-week').textContent = bookings.filter(b => b.date <= weekStr && b.date >= today).length;

            // Render table
            if (bookings.length === 0) {
                bookingsTbody.innerHTML = '';
                noBookings.style.display = 'block';
                return;
            }

            noBookings.style.display = 'none';
            bookingsTbody.innerHTML = bookings.reverse().map(booking => `
                <tr>
                    <td class="booking-id">${booking.id}</td>
                    <td>${booking.name}</td>
                    <td>${booking.phone}</td>
                    <td>${booking.date}</td>
                    <td>${booking.time}</td>
                    <td>${booking.guests}</td>
                    <td>${booking.occasion || '-'}</td>
                    <td><span class="booking-status">Confirmed</span></td>
                </tr>
            `).join('');
        }
    </script>
</body>
</html>
