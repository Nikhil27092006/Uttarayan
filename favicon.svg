<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 32 32">
  <defs>
    <linearGradient id="sky" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" stop-color="#FF6B35"/>
      <stop offset="100%" stop-color="#FFB347"/>
    </linearGradient>
  </defs>
  <!-- Sky background circle -->
  <circle cx="16" cy="16" r="15" fill="url(#sky)"/>
  <!-- Sun -->
  <circle cx="16" cy="13" r="5" fill="#FFD700"/>
  <!-- Kite -->
  <polygon points="16,6 11,18 16,16 21,18" fill="#E63946"/>
  <!-- Kite tail -->
  <path d="M16,16 Q14,20 16,24 Q18,22 20,24" stroke="#FFD700" stroke-width="1.5" fill="none"/>
  <!-- Kite string -->
  <line x1="16" y1="18" x2="12" y2="26" stroke="#8B4513" stroke-width="1"/>
</svg>